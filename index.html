<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Amway CRM</title>
        
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Amway CRM">
    <meta name="mobile-web-app-capable" content="yes">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .safe-area-container {
            width: 100%;
            height: 100%;
            /* ดันเนื้อหาลงมาตามระยะรอยบาก หรือ Status Bar อัตโนมัติ */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            box-sizing: border-box;

        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            -webkit-user-select: auto;
            user-select: auto;
        }
    </style>
</head>
<body>

    <div class="safe-area-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbwbwNU1vwNc-gR2JkJM0ZJU318oyBIOWr4Ozq_aUaZurlVFYO_PrdbECEVbLQI1BQJOBA/exec"
            allow="geolocation; microphone; camera"
            title="App Content">
        </iframe>
    </div>

</body>
</html>
