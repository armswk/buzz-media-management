<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- เพิ่ม viewport-fit=cover เพื่อให้ iOS คำนวณระยะขอบจอ (Safe Area) ได้ถูกต้อง -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>CRM</title>

    <!-- ตั้งค่า PWA สำหรับ iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- ตั้งค่าสีของ Status Bar (default, black, black-translucent) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CRM App">
    
    <!-- สามารถเพิ่มไอคอนแอพสำหรับหน้า Home Screen ได้ที่นี่ -->
    <!-- <link rel="apple-touch-icon" href="icon.png"> -->

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* This prevents the "bounce" effect on mobile browsers */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            /* ตั้งค่าสีพื้นหลังตรงนี้เพื่อให้เนียนไปกับขอบจอด้านบนของ iPhone */
            background-color: #f3f4f6; /* ตรงกับ bg-gray-100 */
        }

        /* คลาสสำหรับดันเนื้อหาให้พ้นระยะขอบจอของ iPhone ทุกรุ่น */
        .safe-area-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            /* ดันขอบบนให้พ้นรอยบาก / Dynamic Island และ Status Bar */
            padding-top: env(safe-area-inset-top);
            /* ดันขอบล่างให้พ้นขีด Home Indicator */
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="safe-area-wrapper">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbw-bF6HgJ68FgHcK4BpWjLfNF3SK8HH6yRphUfI3Cuj4gVfBtg6myOAcQBqC6LeFMNL/exec"
            class="w-full flex-grow border-none"
            allow="geolocation; microphone; camera"
            title="App Content">
        </iframe>
    </div>

</body>
</html>
